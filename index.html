<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoE: EO'nun Dükkanı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --bg-gradient: linear-gradient(160deg, #0a0a0a 0%, #1a120b 40%, #0d0d0d 100%);
            --text-color: #f0ece4;
            --text-muted: rgba(240, 236, 228, 0.5);
            --accent-color: #e8a924;
            --danger-color: #d44030;
            --success-color: #4ec9a0;
            --eo-color: #b85c38;
            --black-market-color: #8b0000;
            --glass-bg: rgba(232, 169, 36, 0.04);
            --glass-border: rgba(232, 169, 36, 0.12);
            --surface: rgba(20, 16, 12, 0.8);
            --shadow: 0 4px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(232, 169, 36, 0.05);
            --font-heading: 'Cinzel Decorative', serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-gradient);
            background-attachment: fixed;
            background-size: cover;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Geometric background pattern overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 60px,
                    rgba(232, 169, 36, 0.015) 60px,
                    rgba(232, 169, 36, 0.015) 61px),
                repeating-linear-gradient(-45deg,
                    transparent,
                    transparent 60px,
                    rgba(232, 169, 36, 0.015) 60px,
                    rgba(232, 169, 36, 0.015) 61px);
            pointer-events: none;
            z-index: 0;
            animation: bgShift 20s ease-in-out infinite alternate;
            will-change: opacity;
        }

        @keyframes bgShift {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        /* UTILS - GLASSMORPHISM */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 0.5px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background: rgba(232, 169, 36, 0.08);
            border: 0.5px solid var(--glass-border);
            color: var(--text-color);
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: var(--font-body);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 5px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--accent-color);
            color: #0a0a0a;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(232, 169, 36, 0.35);
        }

        .btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(232, 169, 36, 0.2);
        }

        .btn-danger:hover {
            background: var(--danger-color);
            color: var(--text-color);
            box-shadow: 0 6px 24px rgba(212, 64, 48, 0.4);
        }

        .btn-purple:hover {
            background: var(--eo-color);
            color: var(--text-color);
            box-shadow: 0 6px 24px rgba(184, 92, 56, 0.4);
        }

        .btn:disabled {
            border-color: rgba(232, 169, 36, 0.05);
            color: rgba(240, 236, 228, 0.2);
            cursor: not-allowed;
            background: rgba(0, 0, 0, 0.3);
            transform: none;
            box-shadow: none;
        }

        /* HEADER */
        header {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(8px);
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            position: relative;
            animation: warmGlow 4s ease-in-out infinite;
        }

        @keyframes warmGlow {

            0%,
            100% {
                border-bottom-color: rgba(232, 169, 36, 0.12);
            }

            50% {
                border-bottom-color: rgba(232, 169, 36, 0.25);
            }
        }

        .stats {
            display: flex;
            gap: 25px;
        }

        .stat-box {
            text-align: right;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .money {
            color: var(--success-color);
            font-weight: 700;
        }

        .logo {
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #e8a924, #b85c38, #e8a924);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            animation: logoShimmer 3s ease-in-out infinite;
        }

        @keyframes logoShimmer {

            0%,
            100% {
                background-position: 0% center;
            }

            50% {
                background-position: 200% center;
            }
        }

        /* MAIN CONTENT AREA */
        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }

        /* Custom scrollbar */
        main::-webkit-scrollbar {
            width: 6px;
        }

        main::-webkit-scrollbar-track {
            background: transparent;
        }

        main::-webkit-scrollbar-thumb {
            background: rgba(232, 169, 36, 0.2);
            border-radius: 3px;
        }

        main::-webkit-scrollbar-thumb:hover {
            background: rgba(232, 169, 36, 0.4);
        }

        /* SCREENS */
        .screen {
            width: 100%;
            max-width: 900px;
            text-align: center;
            animation: screenReveal 0.7s cubic-bezier(0.22, 1, 0.36, 1);
            padding: 30px;
            margin-top: 20px;
        }

        .screen h2 {
            font-family: var(--font-heading);
            letter-spacing: 2px;
            font-weight: 700;
        }

        .screen h3 {
            font-family: var(--font-heading);
            font-weight: 700;
        }

        /* Glass Panel Container for Screens */
        .screen-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 0.5px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 40px;
        }

        @keyframes screenReveal {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* STORAGE SELECTION */
        .storage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .storage-card {
            background: var(--surface);
            border: 0.5px solid var(--glass-border);
            padding: 22px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
            position: relative;
            overflow: hidden;
            animation: cardStagger 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .storage-card:nth-child(1) {
            animation-delay: 0.05s;
        }

        .storage-card:nth-child(2) {
            animation-delay: 0.1s;
        }

        .storage-card:nth-child(3) {
            animation-delay: 0.15s;
        }

        .storage-card:nth-child(4) {
            animation-delay: 0.2s;
        }

        .storage-card:nth-child(5) {
            animation-delay: 0.25s;
        }

        @keyframes cardStagger {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .storage-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .storage-card:hover::before {
            opacity: 1;
        }

        .storage-card:hover {
            transform: translateY(-8px);
            background: rgba(232, 169, 36, 0.06);
            border-color: rgba(232, 169, 36, 0.3);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(232, 169, 36, 0.08);
        }

        .storage-card h3 {
            margin-top: 0;
            color: var(--accent-color);
            font-family: var(--font-heading);
            font-size: 1rem;
        }

        .storage-card.black-market {
            background: rgba(10, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            border-color: #8b0000;
            color: #e0e0e0;
            font-weight: 800;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.4);
            animation: cardStagger 0.5s cubic-bezier(0.22, 1, 0.36, 1) both, pulse-red 2.5s ease-in-out infinite;
        }

        .storage-card.black-market h3 {
            color: #c62828;
        }

        .storage-card.black-market p {
            font-weight: 800;
        }

        .storage-card.black-market .unit-price {
            color: #c62828 !important;
            text-shadow: 0 0 12px rgba(198, 40, 40, 0.6) !important;
        }

        @keyframes pulse-red {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
            }

            50% {
                box-shadow: 0 0 30px rgba(139, 0, 0, 0.6), inset 0 0 30px rgba(139, 0, 0, 0.05);
            }
        }

        .risk-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .risk-low {
            background: rgba(78, 201, 160, 0.15);
            color: var(--success-color);
        }

        .risk-med {
            background: rgba(232, 169, 36, 0.15);
            color: var(--accent-color);
        }

        .risk-high {
            background: rgba(212, 64, 48, 0.15);
            color: var(--danger-color);
        }

        .risk-black {
            background: rgba(139, 0, 0, 0.3);
            color: #c62828;
            border: 0.5px solid rgba(139, 0, 0, 0.5);
        }

        /* ITEM REVEAL & LISTS */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 30px 0;
            text-align: left;
        }

        .item-row {
            background: var(--surface);
            padding: 14px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid transparent;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .item-row:nth-child(1) {
            animation-delay: 0.03s;
        }

        .item-row:nth-child(2) {
            animation-delay: 0.06s;
        }

        .item-row:nth-child(3) {
            animation-delay: 0.09s;
        }

        .item-row:nth-child(4) {
            animation-delay: 0.12s;
        }

        .item-row:nth-child(5) {
            animation-delay: 0.15s;
        }

        .item-row:nth-child(6) {
            animation-delay: 0.18s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-12px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .item-row:hover {
            background: rgba(232, 169, 36, 0.05);
            transform: translateX(4px);
        }

        .rarity-junk {
            border-color: #6b6b6b;
        }

        .rarity-common {
            border-color: var(--success-color);
        }

        .rarity-rare {
            border-color: var(--accent-color);
        }

        .rarity-legendary {
            border-color: #e8a924;
            background: linear-gradient(90deg, rgba(232, 169, 36, 0.08), transparent);
            animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both, shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {

            0%,
            100% {
                border-color: #e8a924;
            }

            50% {
                border-color: #f5d070;
                box-shadow: 0 0 12px rgba(232, 169, 36, 0.15);
            }
        }

        .certified-badge {
            background: var(--accent-color);
            color: #0a0a0a;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            margin-left: 8px;
            vertical-align: middle;
            letter-spacing: 0.5px;
        }

        .category-badge {
            background: rgba(240, 236, 228, 0.1);
            color: var(--text-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 500;
            margin-left: 5px;
            vertical-align: middle;
            letter-spacing: 0.5px;
            border: 0.5px solid var(--glass-border);
        }

        /* NEGOTIATION SCENE */
        .scene-container {
            display: flex;
            flex-direction: column;
            height: 500px;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            background:
                radial-gradient(ellipse at 50% 20%, rgba(184, 92, 56, 0.15) 0%, transparent 60%),
                linear-gradient(180deg, #0d0907 0%, #1a120b 50%, #0a0a0a 100%);
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.6);
            border: 0.5px solid var(--glass-border);
        }

        /* Dark overlay */
        .scene-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.4);
            z-index: 1;
        }

        .eo-avatar-container {
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .eo-avatar {
            font-size: 80px;
            background: radial-gradient(circle, rgba(184, 92, 56, 0.3) 0%, rgba(0, 0, 0, 0) 70%);
            padding: 20px;
            border-radius: 50%;
            animation: breathe 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(184, 92, 56, 0.3));
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.85;
            }
        }

        .speech-bubble {
            background: rgba(20, 16, 12, 0.92);
            color: var(--text-color);
            padding: 16px 24px;
            border-radius: 14px;
            border-bottom-left-radius: 2px;
            max-width: 60%;
            margin-top: 10px;
            font-weight: 500;
            font-size: 1.05rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 3;
            text-align: left;
            border: 0.5px solid var(--glass-border);
            line-height: 1.5;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: rgba(20, 16, 12, 0.92) transparent;
        }

        .negotiation-desk {
            z-index: 2;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-top: 0.5px solid var(--glass-border);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .desk-item {
            flex: 1;
            text-align: left;
        }

        .desk-actions {
            flex: 2;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        /* HUB MENU */
        .hub-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-top: 40px;
        }

        .hub-card {
            background: var(--surface);
            border: 0.5px solid var(--glass-border);
            padding: 28px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: cardStagger 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
            position: relative;
            overflow: hidden;
        }

        .hub-card:nth-child(1) {
            animation-delay: 0.05s;
        }

        .hub-card:nth-child(2) {
            animation-delay: 0.1s;
        }

        .hub-card:nth-child(3) {
            animation-delay: 0.15s;
        }

        .hub-card:nth-child(4) {
            animation-delay: 0.2s;
        }

        .hub-card:nth-child(5) {
            animation-delay: 0.25s;
        }

        .hub-card:nth-child(6) {
            animation-delay: 0.3s;
        }

        .hub-card:nth-child(7) {
            animation-delay: 0.35s;
        }

        .hub-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .hub-card:hover::before {
            opacity: 1;
        }

        .hub-card:hover {
            background: rgba(232, 169, 36, 0.06);
            transform: translateY(-6px);
            border-color: rgba(232, 169, 36, 0.3);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.4);
        }

        .hub-icon {
            font-size: 2.8rem;
        }

        .hub-title {
            font-size: 1.1rem;
            font-weight: 700;
            font-family: var(--font-heading);
            letter-spacing: 1px;
        }

        /* AUCTION SCREEN */
        .auction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .auction-main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auction-visual {
            background: rgba(10, 10, 10, 0.6);
            border-radius: 14px;
            padding: 30px;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 0.5px solid var(--glass-border);
        }

        .current-bid-display {
            font-size: 3.5rem;
            font-weight: 900;
            font-family: var(--font-heading);
            color: var(--success-color);
            text-shadow: 0 0 30px rgba(78, 201, 160, 0.3);
        }

        .timer-display {
            font-size: 1.4rem;
            color: var(--danger-color);
            font-weight: 700;
            margin-top: 10px;
            height: 30px;
            font-family: var(--font-mono);
        }

        .opponents-grid {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin: 20px 0;
        }

        .opponent-card {
            background: var(--surface);
            border: 0.5px solid var(--glass-border);
            padding: 10px;
            border-radius: 10px;
            width: 80px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .opponent-card.active-bidder {
            border-color: var(--char-color);
            background: rgba(232, 169, 36, 0.06);
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--char-color), inset 0 0 8px var(--char-color);
        }

        .opponent-card.folded {
            opacity: 0.25;
            filter: grayscale(1);
        }

        .opponent-avatar {
            font-size: 2.5rem;
        }

        .opponent-name {
            font-size: 0.7rem;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-muted);
        }

        .last-action {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent-color);
            color: #0a0a0a;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            display: none;
        }

        .bid-log {
            background: rgba(10, 10, 10, 0.7);
            height: 150px;
            overflow-y: auto;
            border-radius: 8px;
            padding: 12px;
            text-align: left;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            border: 0.5px solid var(--glass-border);
            color: var(--text-muted);
        }

        .bid-log::-webkit-scrollbar {
            width: 4px;
        }

        .bid-log::-webkit-scrollbar-track {
            background: transparent;
        }

        .bid-log::-webkit-scrollbar-thumb {
            background: rgba(232, 169, 36, 0.15);
            border-radius: 2px;
        }

        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(232, 169, 36, 0.05);
            padding-bottom: 3px;
        }

        .log-entry.high-bid {

        }

            color: var(--danger-color);
            font-style: italic;
        }

            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        /* SPEECH BUBBLES FOR AUCTION */
        .mini-bubble {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.95);
            border: 1.5px solid var(--char-color);
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: var(--font-body);
            white-space: nowrap;
            z-index: 100;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            box-shadow: 0 0 12px var(--char-color);
            text-shadow: none;
            font-weight: 600;
        }

        .bubble-top {
            bottom: 110%;
        }

        .bubble-top::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: var(--char-color) transparent transparent transparent;
        }

        .bubble-bottom {
            top: 110%;
        }

        .bubble-bottom::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 8px 8px;
            border-style: solid;
            border-color: transparent transparent var(--char-color) transparent;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translateX(-50%) scale(0.5);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
        }
    </style>

            getLine: function (category, reputation) {
                // If the category is threatResponse (array), return directly
                if (Array.isArray(this.dialogue[category])) {
                    const lines = this.dialogue[category];
                    return lines[Math.floor(Math.random() * lines.length)];
                }

                let tier = 'neutral';
                if (reputation > 70) tier = 'friendly';
                else if (reputation < 30) tier = 'suspicious';

                const lines = this.dialogue[category][tier];
                return lines[Math.floor(Math.random() * lines.length)];
            },

            // Logic to determine initial offer (always lowball)
            calculateOffer: function (itemRealValue, reputation) {
                // Base offer is 40-60% of real value
                let percent = 0.4 + (Math.random() * 0.2);

                // Reputation bonus
                if (reputation > 70) percent += 0.15; // Better offers for friends
                if (reputation < 30) percent -= 0.15; // Worse for suspicious

                return Math.floor(itemRealValue * percent);
            }

        // XP SYSTEM
        function addXp(amount) {
            gameState.xp += amount;
            const xpNeeded = gameState.level * 1000;
            if (gameState.xp >= xpNeeded) {
                gameState.level++;
                gameState.xp -= xpNeeded;
                gameState.skillPoints++;
                alert(`🎉 TEBRİKLER! Seviye Atladın! Yeni Seviye: ${gameState.level}. +1 Yetenek Puanı kazandın.`);
            }
            updateHeader();
        }

        // QUEST SYSTEM
        function generateQuests() {
            gameState.quests = [];
            const questCount = 2 + Math.floor(Math.random() * 2); // 2 or 3
            const categories = ["Elektronik", "Antika", "Giyim", "Mobilya", "Spor"];

            for (let i = 0; i < questCount; i++) {
                const isSellQuest = Math.random() > 0.5;
                if (isSellQuest) {
                    const type = Math.random() > 0.7 ? 'rare' : 'common';
                    const targetCount = 1 + Math.floor(Math.random() * 2);
                    const rewardMult = type === 'rare' ? 2 : 1;
                    gameState.quests.push({
                        id: Date.now() + i,
                        text: `${targetCount} adet ${type === 'rare' ? 'Nadir' : 'Sıradan'} eşya sat`,
                        type: 'sell_rarity',
                        target: type,
                        count: targetCount,
                        current: 0,
                        rewardMoney: 500 * targetCount * rewardMult,
                        rewardXp: 100 * targetCount * rewardMult
                    });
                } else {
                    const cat = categories[Math.floor(Math.random() * categories.length)];
                    const targetCount = 1 + Math.floor(Math.random() * 2);
                    gameState.quests.push({
                        id: Date.now() + i,
                        text: `${targetCount} adet ${cat} kategorisinde eşya sat`,
                        type: 'sell_category',
                        target: cat,
                        count: targetCount,
                        current: 0,
                        rewardMoney: 400 * targetCount,
                        rewardXp: 80 * targetCount
                    });
                }
            }
        }

                if (q.completed) return;

                let match = false;
                if (q.type === 'sell_rarity' && item.type === q.target) match = true;
                if (q.type === 'sell_category' && item.category === q.target) match = true;

                if (match) {
                    q.current++;
                    if (q.current >= q.count) {
                        q.completed = true;
                        gameState.money += q.rewardMoney;
                        addXp(q.rewardXp);
                        alert(`✅ GÖREV TAMAMLANDI: ${q.text}\nÖdül: ${q.rewardMoney}₺, ${q.rewardXp} XP`);
                        completedAny = true;
                    }
                }
            });
            if (completedAny) updateHeader();
        }

        function startRound() {
            gameState.availableUnits = generateStorageUnits();
            generateQuests(); // New quests every round

            // Determine Patience based on Reputation
            if (gameState.reputation > 70) gameState.eoPatience = 4;
            else if (gameState.reputation < 30) gameState.eoPatience = 2;
            else gameState.eoPatience = 3;

            gameState.negotiationMemory = {};

            // Check for Game Over (Bankruptcy)
            // If the player cannot afford the cheapest unit, they are done.
            const cheapestUnit = Math.min(...gameState.availableUnits.map(u => u.price));

            if (gameState.money < cheapestUnit) {
                renderGameOver();
            } else {
                renderStorageSelection();
            }
        }

        function renderGameOver() {
            ui.app.innerHTML = `
                <div class="screen screen-glass">
                    <h1 style="color: var(--danger-color)">🚫 İFLAS ETTİN</h1>
                    <div style="font-size:3rem; margin:20px;">💸</div>
                    <p>Cebinde kalan para: <span class="money">${gameState.money} ₺</span></p>
                    <div class="speech-bubble" style="margin:20px auto; color:#333;">EO: "Üzgünüm dostum, burası hayır kurumu değil. Başka kapıya."</div>
                    <p>Ulaşılan Tur: ${gameState.round}</p>
                    <button class="btn" onclick="location.reload()">🔄 TEKRAR DENE</button>
                </div>
            `;
        }

        function generateStorageUnits() {
            const units = [];
            const risks = ['Düşük', 'Orta', 'Yüksek'];

            for (let i = 0; i < 5; i++) {
                // Black Market Chance (3%)
                let isBlackMarket = Math.random() < 0.03;

                let riskLevel, riskLabel, name, desc, className;
                let estimatedMin, estimatedMax;

                if (isBlackMarket) {
                    riskLevel = 3; // Special ID for Black Market
                    riskLabel = "KARA BORSA";
                    name = `Depo #${100 + i + (gameState.round * 5)} (KARA BORSA)`;
                    className = "black-market";
                    desc = "Kırmızı bir ışık yayıyor... İçerisi tehlikeli görünüyor.";

                    let baseVal = 15000 + (gameState.round * 2000);
                    // Black market estimate is always huge range
                    estimatedMin = Math.floor(baseVal * 0.5);
                    estimatedMax = Math.floor(baseVal * 3.0);

                } else {
                    riskLevel = Math.floor(Math.random() * 3); // 0, 1, 2
                    riskLabel = risks[riskLevel];
                    name = `Depo #${100 + i + (gameState.round * 5)}`;
                    className = "";
                    desc = generateUnitDescription(riskLevel);

                    let baseVal = 500 + (gameState.round * 50);
                    if (riskLevel === 1) baseVal *= 1.5;
                    if (riskLevel === 2) baseVal *= 2.5;

                    // Accuracy Logic
                    if (riskLevel === 0) { // Low Risk: Accurate
                        estimatedMin = Math.floor(baseVal * 0.9);
                        estimatedMax = Math.floor(baseVal * 1.1);
                    } else if (riskLevel === 1) { // Med Risk: Balanced
                        estimatedMin = Math.floor(baseVal * 0.7);
                        estimatedMax = Math.floor(baseVal * 1.4);
                    } else { // High Risk: Wild
                        estimatedMin = Math.floor(baseVal * 0.4);
                        estimatedMax = Math.floor(baseVal * 2.5);
                    }
                }

                let unit = {
                    id: i,
                    name: name,
                    risk: riskLevel,
                    riskLabel: riskLabel,
                    estimatedMin: estimatedMin,
                    estimatedMax: estimatedMax,
                    description: desc,
                    className: className,
                    soldTo: null // Tracks if AI bought it
                };

                // Önceden eşyaları oluşturup saklıyoruz
                unit.hiddenItems = generateItemsForUnit(unit);
                units.push(unit);
            }
            return units;
        }

        function generateUnitDescription(risk) {
            const descs = [
                ["Temiz görünüyor.", "Birkaç koli var.", "Standart ev eşyaları."], // Low
                ["Karışık bir yığın.", "Bazı kutular kapalı.", "Tozlu ama dolu."], // Med
                ["Tam bir muamma.", "Ya hazine ya çöp.", "Ağır kutular var."] // High
            ];
            return descs[risk][Math.floor(Math.random() * descs[risk].length)];
        }

        // --- AUCTION SYSTEM ---

        window.startAuction = function (unitId) {
            const unit = gameState.availableUnits.find(u => u.id === unitId);
            if (!unit) return;

            // Initialize Auction State
            const startBid = Math.floor((unit.estimatedMin + unit.estimatedMax) / 2 * 0.5);

            gameState.auction = {
                unit: unit,
                currentBid: startBid,
                highestBidder: null, // null = no one yet (or house)
                timer: 0, // 0=Waiting, 1=Going Once, 2=Going Twice, 3=Sold
                timerInterval: null,
                participants: OPPONENTS.map(op => ({
                    ...op,
                    isFolded: false,
                    lastAction: null // 'bid', 'pass', 'wait'
                })),
                log: [`İhale başladı! Başlangıç fiyatı: ${startBid} ₺`],
                playerFolded: false,
                lastBidTime: Date.now(),
                lastLogIndex: 0
            };

            setupAuctionUI();

            // Start the loop
            if (gameState.auction.timerInterval) clearInterval(gameState.auction.timerInterval);
            gameState.auction.timerInterval = setInterval(updateAuctionLoop, 1000);
        };

        function updateAuctionUI() {
            const auc = gameState.auction;
            if (!auc) return;

            // Update Bid Text
            document.getElementById('auction-current-bid').innerText = auc.currentBid + ' ₺';

            // Update Timer Text
            let timerText = "Teklif Bekleniyor...";
            if (auc.timer === 1) timerText = "SATILIYOR... (1)";
            if (auc.timer === 2) timerText = "SATILIYOR... (2)";
            if (auc.timer === 3) timerText = "SATILDI!";
            document.getElementById('auction-timer-text').innerText = timerText;

            // Update Participants Visuals
            auc.participants.forEach(p => {
                const card = document.getElementById(`opponent-card-${p.id}`);
                const badge = document.getElementById(`leader-badge-${p.id}`);

                if (card) {
                    // Classes
                    if (p.isFolded) {
                        card.classList.add('folded');
                        card.classList.remove('active-bidder');
                    } else if (auc.highestBidder && auc.highestBidder.id === p.id) {
                        card.classList.add('active-bidder');
                        card.classList.remove('folded');
                    } else {
                        card.classList.remove('active-bidder', 'folded');
                    }
                }

                if (badge) {
                    badge.style.display = (auc.highestBidder && auc.highestBidder.id === p.id) ? 'block' : 'none';
                }
            });

            // Update Player Visuals
            const pCard = document.getElementById('opponent-card-player');
            const pBadge = document.getElementById('leader-badge-player');
            const pWinMsg = document.getElementById('player-win-msg');
            const isPlayerLeader = auc.highestBidder && auc.highestBidder.id === 'player';

            if (pCard) {
                if (auc.playerFolded) {
                    pCard.classList.add('folded');
                    pCard.classList.remove('active-bidder');
                } else if (isPlayerLeader) {
                    pCard.classList.add('active-bidder');
                    pCard.classList.remove('folded');
                } else {
                    pCard.classList.remove('active-bidder', 'folded');
                }
            }

            if (pBadge) pBadge.style.display = isPlayerLeader ? 'block' : 'none';
            if (pWinMsg) pWinMsg.style.display = isPlayerLeader ? 'block' : 'none';

            // Update Buttons
            const canBid = !auc.playerFolded && gameState.money >= (auc.currentBid + 50) && auc.timer < 3;
            document.getElementById('btn-bid-50').disabled = !canBid;
            document.getElementById('btn-bid-200').disabled = !canBid;
            document.getElementById('btn-fold').disabled = (auc.playerFolded || auc.timer >= 3);

            // Update Log (Append only)
            const logContainer = document.getElementById('auction-log');
            if (logContainer && auc.lastLogIndex < auc.log.length) {
                for (let i = auc.lastLogIndex; i < auc.log.length; i++) {
                    const entry = auc.log[i];
                    const isHigh = entry.includes('teklif');
                    const isFold = entry.includes('çekildi');
                    const className = isHigh ? 'high-bid' : (isFold ? 'fold' : '');

                    const div = document.createElement('div');
                    div.className = `log-entry ${className}`;
                    div.innerText = entry;
                    logContainer.appendChild(div);
                }
                auc.lastLogIndex = auc.log.length;
                logContainer.scrollTop = logContainer.scrollHeight;
            }
        }

        function showSpeech(id, type) {
            const linesObj = OPPONENT_LINES[id];
            if (!linesObj) return;

            const lines = linesObj[type];
            if (!lines || lines.length === 0) return;

            const text = lines[Math.floor(Math.random() * lines.length)];

            const card = document.getElementById(`opponent-card-${id}`);
            if (!card) return;

            // Remove existing bubble if any
            const existing = card.querySelector('.mini-bubble');
            if (existing) existing.remove();

            // Determine Position (Zig-Zag)
            // Yilong (0) -> Top, Hasan (1) -> Bottom, Daniel (2) -> Top, Cilem (3) -> Bottom
            const opIndex = OPPONENTS.findIndex(o => o.id === id);
            const isTop = (opIndex === -1) ? true : (opIndex % 2 === 0);
            const posClass = isTop ? 'bubble-top' : 'bubble-bottom';

            const bubble = document.createElement('div');
            bubble.className = `mini-bubble ${posClass}`;
            bubble.innerText = text;

            card.appendChild(bubble);

            setTimeout(() => {
                bubble.style.opacity = '0';
                setTimeout(() => bubble.remove(), 300);
            }, 3000);
        }

        window.placePlayerBid = function (amount) {
            const auc = gameState.auction;
            if (!auc || auc.playerFolded) return;

            const nextBid = auc.currentBid + amount;
            if (gameState.money < nextBid) {
                alert("Yetersiz bakiye!");
                return;
            }

            placeBid('player', nextBid);
        };

        window.playerFold = function () {
            const auc = gameState.auction;
            if (!auc) return;

            // Stop timer
            if (auc.timerInterval) clearInterval(auc.timerInterval);

            // Mark unit as sold/unusable
            // User requested: "o depo kullanılamaz olsun artık"
            // We mark it as sold to an anonymous buyer so it appears grayed out
            auc.unit.soldTo = { name: "Başkası" };

            // Clear active auction
            gameState.auction = null;

            // Return immediately
            renderStorageSelection();
        };

        function updateAuctionLoop() {
            const auc = gameState.auction;
            if (!auc) return;

            // Timer Logic
            const now = Date.now();
            const timeSinceLastBid = now - auc.lastBidTime;

            if (timeSinceLastBid > 9000) {
                auc.timer = 3; // SOLD
                updateAuctionUI(); // Final update
                clearInterval(auc.timerInterval);
                setTimeout(endAuction, 500); // Small delay to see SOLD state
            } else if (timeSinceLastBid > 6000) {
                auc.timer = 2; // Going Twice
            } else if (timeSinceLastBid > 3000) {
                auc.timer = 1; // Going Once
            } else {
                auc.timer = 0; // Waiting
            }

            // Random Speech Chance (Idle)
            if (Math.random() < 0.05) { // 5% per second
                const active = auc.participants.filter(p => !p.isFolded);
                if (active.length > 0) {
                    const speaker = active[Math.floor(Math.random() * active.length)];
                    showSpeech(speaker.id, 'random');
                }
            }

            // Process AI (if not sold)
            if (auc.timer < 3) {
                processAIBidding();
            }

            updateAuctionUI();
        }

        function processAIBidding() {
            const auc = gameState.auction;
            // Only one AI bids per tick max to avoid chaos, or random chance
            if (Math.random() < 0.6) return; // 60% chance no one acts this tick

            // Shuffle participants to randomise order
            const activeAI = auc.participants.filter(p => !p.isFolded && p.id !== (auc.highestBidder ? auc.highestBidder.id : ''));
            if (activeAI.length === 0) return;

            const ai = activeAI[Math.floor(Math.random() * activeAI.length)];

            // Decision Logic
            const unit = auc.unit;

            if (!ai.perceivedLimit) {
                // Initialize limit once
                let estimateAvg = (unit.estimatedMin + unit.estimatedMax) / 2;
                let riskFactor = 1;
                if (unit.risk === 1) riskFactor = 1.2;
                if (unit.risk === 2) riskFactor = 1.5;
                if (unit.risk === 3) riskFactor = 2.0; // Black market

                switch (ai.id) {
                    case 'yilong': // Crazy, rich, troll
                        ai.perceivedLimit = unit.estimatedMax * (1 + Math.random() * 2);
                        break;
                    case 'hasan': // Scrap dealer, very conservative
                        ai.perceivedLimit = unit.estimatedMin * (0.8 + Math.random() * 0.3);
                        break;
                    case 'daniel': // Smart, calculates margin
                        ai.perceivedLimit = unit.estimatedMax * 0.8;
                        break;
                    case 'cilem': // Pessimist, poor
                        ai.perceivedLimit = unit.estimatedMin * (0.5 + Math.random() * 0.4);
                        break;
                }
            }

            // Logic to Bid or Fold
            const nextMinBid = auc.currentBid + 50;

            // Check budget
            if (nextMinBid > ai.wealth) {
                ai.isFolded = true;
                auc.log.push(`${ai.avatar} ${ai.name} parasızlıktan çekildi.`);
                showSpeech(ai.id, 'fold');
                return;
            }

            // Check Limit
            if (nextMinBid > ai.perceivedLimit) {
                // Yilong might troll and go over limit sometimes (10%)
                if (ai.id === 'yilong' && Math.random() < 0.1) {
                    // Troll bid
                } else {
                    ai.isFolded = true;
                    auc.log.push(`${ai.avatar} ${ai.name} çekildi.`);
                    showSpeech(ai.id, 'fold');
                    return;
                }
            }

            // Yilong "Wait" Logic
            if (ai.id === 'yilong' && Math.random() < 0.3) {
                return;
            }

            // Place Bid
            let increment = 50;
            if (ai.aggressive > 0.5 && Math.random() < 0.5) increment = 200;
            if (ai.id === 'yilong' && Math.random() < 0.2) increment = 500;

            placeBid(ai.id, auc.currentBid + increment);
        }

        function placeBid(bidderId, amount) {
            const auc = gameState.auction;
            if (auc.timer >= 3) return; // Closed

            // Update State
            auc.currentBid = amount;

            if (bidderId === 'player') {
                auc.highestBidder = { id: 'player', name: 'SEN' };
                auc.log.push(`👤 SEN ${amount} ₺ teklif verdin!`);
            } else {
                const ai = auc.participants.find(p => p.id === bidderId);
                auc.highestBidder = ai;
                auc.log.push(`${ai.avatar} ${ai.name} ${amount} ₺ teklif verdi!`);

                showSpeech(ai.id, 'bid');
            }

            // Reset Timer
            auc.lastBidTime = Date.now();
            auc.timer = 0;

            // Immediate UI update for responsiveness
            updateAuctionUI();
        }

        function endAuction() {
            const auc = gameState.auction;
            const winner = auc.highestBidder;

            if (winner && winner.id === 'player') {
                // Player Won
                if (gameState.money >= auc.currentBid) {
                    completePlayerPurchase(auc.unit, auc.currentBid);
                } else {
                    alert("Hata: Yetersiz Bakiye!");
                    renderStorageSelection();
                }
            } else if (winner) {
                // AI Won
                alert(`İhaleyi ${winner.name} kazandı! Fiyat: ${auc.currentBid} ₺`);
                auc.unit.soldTo = winner;
                renderStorageSelection();
            } else {
                alert("Kimse teklif vermedi. İhale iptal.");
                renderStorageSelection();
            }
            gameState.auction = null;
        }

        function completePlayerPurchase(unit, finalPrice) {
            gameState.money -= finalPrice;
            gameState.currentUnit = unit;
            updateHeader();

            // Use pre-generated items
            const newItems = unit.hiddenItems;
            gameState.inventory.push(...newItems);

            // Remove unit from available list? Or mark as sold to player?
            // Original logic removed it from "availableUnits" implicitly by regenerating or just showing the reveal screen.
            // But if we want to return to the list later, we should mark it.
            // However, the game flow is: Buy -> Reveal -> Hub. So we don't need to persist it in the list for this round usually.
            // But let's follow the standard 'revealItems' flow which replaces the screen.

            revealItems(newItems);
        }

            ui.app.innerHTML = `

        // --- EXPERT PHASE ---

        window.startExpertPhase = function () {
